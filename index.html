<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michael T. Kiley — Economist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #1a1a1a;
      --muted:    #5a5a5a;
      --rule:     #d0ccc4;
      --bg:       #fafaf8;
      --accent:   #2b4a7a;
      --accent-lt:#e8edf4;
    }

    html { font-size: 17px; }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.65;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--rule);
      padding: 2.8rem 0 2rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .name {
      font-family: 'EB Garamond', serif;
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--ink);
      line-height: 1.2;
    }

    .title-line {
      margin-top: 0.35rem;
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    nav {
      margin-top: 1.2rem;
      display: flex;
      gap: 1.6rem;
    }

    nav a {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding-bottom: 1px;
      transition: border-color 0.15s;
    }

    nav a:hover { border-color: var(--accent); }
    nav a.active { border-color: var(--accent); }

    main { padding: 2.8rem 0 4rem; }

    .bio {
      font-family: 'EB Garamond', serif;
      font-size: 1.18rem;
      line-height: 1.75;
      color: var(--ink);
      margin-bottom: 2.2rem;
    }

    .bio a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent-lt);
      transition: border-color 0.15s;
    }

    .bio a:hover { border-color: var(--accent); }

    .section-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--rule);
    }

    .pill-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .pill-list a {
      display: inline-block;
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--rule);
      border-radius: 2rem;
      padding: 0.25rem 0.85rem;
      transition: border-color 0.15s, background 0.15s;
    }

    .pill-list a:hover {
      border-color: var(--accent);
      background: var(--accent-lt);
    }

    .section + .section { margin-top: 2.4rem; }

    footer {
      border-top: 1px solid var(--rule);
      padding: 1.4rem 0;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: 1.8rem;
    }

    .header-text { flex: 1; }

    .headshot {
      width: 150px;
      height: 150px;
      border-radius: 4px;
      object-fit: cover;
      object-position: center;
      flex-shrink: 0;
      border: 1px solid var(--rule);
    }

    @media (max-width: 480px) {
      .name { font-size: 1.7rem; }
      nav { gap: 1rem; }
      .headshot { width: 100px; height: 100px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <div class="header-inner">
        <div class="header-text">
          <div class="name">Michael T. Kiley</div>
          <div class="title-line">Economist &mdash; Federal Reserve Board</div>
          <nav>
            <a href="index.html" class="active">Home</a>
            <a href="cv.html">CV</a>
          </nav>
        </div>
        <img class="headshot" src="photo.jpg" alt="Michael T. Kiley" />
      </div>
    </div>
  </header>

  <main>
    <div class="container">

      <p class="bio">
        I am an economist at the Federal Reserve Board. This site contains
        links to my <a href="cv.html">CV</a>.
      </p>

      <div class="section">
        <div class="section-label">Other websites</div>
        <ul class="pill-list">
          <li><a href="http://www.federalreserve.gov/econresdata/michael-t-kiley.htm">Federal Reserve</a></li>
          <li><a href="https://scholar.google.com/citations?user=gpRruBgAAAAJ&hl=en">Google Scholar</a></li>
          <li><a href="https://ideas.repec.org/e/pki4.html">IDEAS / RePec</a></li>
          <li><a href="http://orcid.org/0000-0003-0427-0131">ORCID</a></li>
          <li><a href="https://www.scopus.com/authid/detail.uri?authorId=7004930826">Scopus</a></li>
          <li><a href="https://www.linkedin.com/in/michael-kiley-677482115">LinkedIn</a></li>
        </ul>
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      Updated June 2026
    </div>
  </footer>

</body>
            </html>
